name: media-srv

networks:
  media:
    name: media
    driver: bridge

volumes:
  jellyfin_cache:

# Common health probe knobs (referenced via YAML anchors below).
x-healthcheck-defaults: &healthcheck-defaults
  interval: 30s
  timeout: 5s
  retries: 3
  start_period: 60s

services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    user: ${PUID}:${PGID}
    group_add:
      - ${RENDER_GID}
    devices:
      - /dev/dri:/dev/dri
    environment:
      - TZ=${TZ}
    ports:
      - 8096:8096
    volumes:
      - ${APPDATA}/jellyfin:/config
      - ${MEDIA}/movies:/data/movies:ro
      - ${MEDIA}/tv:/data/tv:ro
      - jellyfin_cache:/cache
    networks:
      - media
    # Jellyfin image ships its own HEALTHCHECK — don't override.
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "4.0"
        reservations:
          memory: 512M

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
    ports:
      - 8080:8080
      - 6881:6881
      - 6881:6881/udp
    volumes:
      - ${APPDATA}/qbittorrent:/config
      - ${MEDIA}/downloads:/data/downloads
    networks:
      - media
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -fsS --max-time 3 http://localhost:8080/api/v2/app/version || exit 1"]
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 256M

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - 9696:9696
    volumes:
      - ${APPDATA}/prowlarr:/config
    networks:
      - media
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -fsS --max-time 3 http://localhost:9696/ping || exit 1"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - 8989:8989
    volumes:
      - ${APPDATA}/sonarr:/config
      - ${MEDIA}:/data
    networks:
      - media
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -fsS --max-time 3 http://localhost:8989/ping || exit 1"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - 7878:7878
    volumes:
      - ${APPDATA}/radarr:/config
      - ${MEDIA}:/data
    networks:
      - media
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -fsS --max-time 3 http://localhost:7878/ping || exit 1"]
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 256M

  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - 6767:6767
    volumes:
      - ${APPDATA}/bazarr:/config
      - ${MEDIA}:/data
    networks:
      - media
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "curl -fsS --max-time 3 http://localhost:6767/ || exit 1"]
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
        reservations:
          memory: 128M

  jellyseerr:
    image: fallenbagel/jellyseerr:latest
    container_name: jellyseerr
    restart: unless-stopped
    environment:
      - LOG_LEVEL=info
      - TZ=${TZ}
    ports:
      - 5055:5055
    volumes:
      - ${APPDATA}/jellyseerr:/app/config
    networks:
      - media
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -qO- --timeout=3 http://localhost:5055/api/v1/status >/dev/null || exit 1"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M

  searcharr:
    image: toddrob/searcharr:latest
    container_name: searcharr
    restart: unless-stopped
    environment:
      - TZ=${TZ}
    volumes:
      - ${APPDATA}/searcharr:/app/data
    networks:
      - media
    # No HTTP interface — relying on docker's "running" state via watchdog.
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
        reservations:
          memory: 64M

  janitorr:
    image: ghcr.io/schaka/janitorr:jvm-stable
    container_name: janitorr
    restart: unless-stopped
    user: ${PUID}:${PGID}
    environment:
      - TZ=${TZ}
      - JVM_ARGS=-Xmx256M
    volumes:
      - ${APPDATA}/janitorr/config:/config
      - ${APPDATA}/janitorr/logs:/logs
      - ${MEDIA}:/data
    networks:
      - media
    healthcheck:
      <<: *healthcheck-defaults
      test: ["CMD-SHELL", "wget -qO- --timeout=3 http://localhost:8978/actuator/health | grep -q '\"status\":\"UP\"' || exit 1"]
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 128M
